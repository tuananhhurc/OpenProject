            label: Подпроекты
            caption: Спринты, созданные в этом проекте, будут доступны всем подпроектам текущего проекта.
            info: При совместном использовании спринта его название, статус и даты начала и окончания будут доступны всем проектам. Они не могут быть изменены в проектах, которые получают и используют эти спринты.
