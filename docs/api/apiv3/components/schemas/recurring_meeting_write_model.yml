# Schema: RecurringMeetingWriteModel
---
type: object
properties:
  title:
    type: string
    description: The recurring meeting's title
  frequency:
    type: string
    description: |-
      The recurrence frequency. Possible values:

      - *daily*
      - *working_days*
      - *weekly*
      - *monthly_day_of_month*
      - *monthly_nth_weekday*
    enum:
      - daily
      - working_days
      - weekly
      - monthly_day_of_month
      - monthly_nth_weekday
  interval:
    type: integer
    description: |-
      The interval between occurrences. Not applicable for working_days frequency.
    minimum: 1
  monthlyDay:
    type: integer
    description: |-
      Day of month for `monthly_day_of_month` frequency.
      Required for `monthly_day_of_month` unless inferred from `startTime`.
    minimum: 1
    maximum: 31
  monthlyOrdinal:
    type: integer
    description: |-
      Ordinal position for `monthly_nth_weekday` frequency.
      Required for `monthly_nth_weekday` unless inferred from `startTime`.
      Allowed values:
      - `1` (first)
      - `2` (second)
      - `3` (third)
      - `4` (fourth)
      - `-1` (last)
    enum:
      - 1
      - 2
      - 3
      - 4
      - -1
  monthlyWeekday:
    type: string
    description: |-
      Weekday for `monthly_nth_weekday` frequency.
      Required for `monthly_nth_weekday` unless inferred from `startTime`.
    enum:
      - sunday
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
  endAfter:
    type: string
    description: |-
      How the recurrence ends. Possible values:

      - *specific_date*
      - *iterations*
      - *never*
    enum:
      - specific_date
      - iterations
      - never
  endDate:
    type:
      - 'string'
      - 'null'
    format: date
    description: |-
      The date on which the recurrence ends. Required when endAfter is `specific_date`.
  iterations:
    type:
      - 'integer'
      - 'null'
    description: |-
      The number of occurrences after which the recurrence ends.
      Required when endAfter is `iterations`.
    minimum: 1
  startTime:
    type: string
    format: date-time
    description: The scheduled start time of the recurring meeting.
  location:
    type: string
    description: The meeting's location.
  duration:
    type: number
    description: The meeting duration in hours.
  notify:
    type: boolean
    description: Whether to send email notifications to participants.
  _links:
    type: object
    properties:
      project:
        allOf:
          - $ref: "./link.yml"
          - description: |-
              The project the recurring meeting belongs to. Required on creation.

              **Resource**: Project
